<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER / GREETING -->
  <header class="header">
    <div class="header-top">
      <button id="themeToggle" class="icon-btn" title="Toggle theme">🌙</button>
    </div>
    <div id="clock" class="clock">00:00:00</div>
    <div id="dateDisplay" class="date">Monday, January 1, 2026</div>
    <div id="greeting" class="greeting">Good Morning</div>
    <div class="name-row">
      <span id="greetingName" class="greeting-name"></span>
      <button id="editNameBtn" class="text-btn">✏️ Edit Name</button>
    </div>

    <!-- Name modal -->
    <div id="nameModal" class="modal hidden">
      <div class="modal-box">
        <h3>What's your name?</h3>
        <input type="text" id="nameInput" class="modal-input" placeholder="Enter your name..." maxlength="30"/>
        <div class="modal-actions">
          <button id="saveNameBtn" class="btn btn-primary">Save</button>
          <button id="cancelNameBtn" class="btn btn-ghost">Cancel</button>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN GRID -->
  <main class="grid">

    <!-- FOCUS TIMER -->
    <section class="card timer-card">
      <h2 class="card-title">⏱ Focus Timer</h2>
      <div id="timerDisplay" class="timer-display">25:00</div>

      <div class="timer-settings">
        <label class="setting-label">Duration (min):</label>
        <input type="number" id="timerDuration" class="duration-input" value="25" min="1" max="90"/>
      </div>

      <div class="timer-controls">
        <button id="startBtn" class="btn btn-primary">▶ Start</button>
        <button id="stopBtn" class="btn btn-secondary">⏸ Stop</button>
        <button id="resetBtn" class="btn btn-ghost">↺ Reset</button>
      </div>

      <div id="timerStatus" class="timer-status">Ready to focus!</div>
    </section>

    <!-- TO-DO LIST -->
    <section class="card todo-card">
      <h2 class="card-title">✅ Tasks</h2>

      <div class="todo-input-row">
        <input type="text" id="taskInput" class="task-input" placeholder="Add a new task..." maxlength="100"/>
        <button id="addTaskBtn" class="btn btn-primary">Add</button>
      </div>

      <div id="dupWarning" class="dup-warning hidden">⚠️ Task already exists!</div>

      <ul id="taskList" class="task-list"></ul>

      <div id="taskEmpty" class="empty-state">No tasks yet. Add one above! 🎯</div>
    </section>

    <!-- QUICK LINKS -->
    <section class="card links-card">
      <h2 class="card-title">🔗 Quick Links</h2>

      <div class="link-input-row">
        <input type="text" id="linkName" class="link-input" placeholder="Link name" maxlength="20"/>
        <input type="text" id="linkUrl" class="link-input" placeholder="https://..." maxlength="200"/>
        <button id="addLinkBtn" class="btn btn-primary">Add</button>
      </div>

      <div id="linkGrid" class="link-grid"></div>
      <div id="linkEmpty" class="empty-state">No quick links yet. Add your favorites!</div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
