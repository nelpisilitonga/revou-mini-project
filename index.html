<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header / Greeting -->
        <header class="header">
            <div class="time-date">
                <div id="time" class="time">00:00:00</div>
                <div id="date" class="date"></div>
            </div>
            <div class="greeting">
                <h1 id="greeting-text">Selamat Pagi</h1>
                <div class="name-input">
                    <input type="text" id="user-name" placeholder="Masukkan nama Anda" value="">
                    <button onclick="saveName()">Simpan</button>
                </div>
            </div>
            <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
        </header>

        <div class="main-content">
            <!-- Focus Timer -->
            <div class="card timer-card">
                <h2>Focus Timer</h2>
                <div id="timer-display" class="timer">25:00</div>
                <div class="timer-controls">
                    <button onclick="startTimer()">Start</button>
                    <button onclick="pauseTimer()">Pause</button>
                    <button onclick="resetTimer()">Reset</button>
                </div>
                <div class="pomodoro-options">
                    <button onclick="setTime(15)">15 min</button>
                    <button onclick="setTime(25)">25 min</button>
                    <button onclick="setTime(45)">45 min</button>
                </div>
            </div>

            <!-- To-Do List -->
            <div class="card todo-card">
                <h2>To-Do List</h2>
                <div class="add-task">
                    <input type="text" id="task-input" placeholder="Tambah tugas baru...">
                    <button onclick="addTask()">Tambah</button>
                </div>
                <ul id="task-list"></ul>
            </div>

            <!-- Quick Links -->
            <div class="card links-card">
                <h2>Quick Links</h2>
                <div class="add-link">
                    <input type="text" id="link-name" placeholder="Nama Link">
                    <input type="text" id="link-url" placeholder="https://...">
                    <button onclick="addLink()">Tambah Link</button>
                </div>
                <div id="links-container" class="links"></div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
